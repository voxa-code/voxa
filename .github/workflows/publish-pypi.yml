# Publishes the PyPI package `voxa-code` when a GitHub Release is published.
#
# Uses PyPI Trusted Publishing (OIDC) -- no API token or password required.
#
# One-time setup (repo owner), on https://pypi.org:
#   Add a Trusted Publisher to the `voxa-code` project (or as a pending
#   publisher if it does not exist yet) with:
#       Owner:            Ti-03
#       Repository:       voxa
#       Workflow name:    publish-pypi.yml
#       Environment name: pypi
name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read   # checkout of the (private) repo needs read; id-token alone drops it
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build distributions
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
