# Publishes the npm package `voxa-code` when a GitHub Release is published.
#
# One-time setup (repo owner), on https://www.npmjs.com:
#   Package Settings -> Trusted Publisher -> add a GitHub Actions publisher
#   with Organization/user = voxa-code, Repository = voxa,
#   Workflow filename = publish-npm.yml.
#   Trusted Publishing (OIDC) needs npm CLI >=11.6.2, hence node-version 24.
#
# NPM_TOKEN is kept as a fallback during the OIDC migration window; once a
# trusted-publisher release has succeeded, drop the NODE_AUTH_TOKEN env var,
# the always-auth input below, and delete the NPM_TOKEN repo secret.
name: Publish to npm

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org
          always-auth: true
      - name: Show tarball contents
        run: npm pack --dry-run
      - name: Publish
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
